<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MealManager — Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-brand">🍽️ MealManager</div>
    <div style="display:flex;align-items:center;gap:14px">
      <span id="syncStatus" class="sync-status sync-loading">Connecting...</span>
      <span id="userNameDisplay" style="font-size:0.85rem;color:rgba(255,255,255,0.85)"></span>
      <button onclick="logout()" style="padding:6px 14px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;border-radius:8px;cursor:pointer;font-size:0.82rem;font-family:inherit">Logout</button>
    </div>
  </nav>

  <div class="container">

    <!-- Top Action Grid -->
    <div class="grid-3">

      <!-- Add User -->
      <div class="card">
        <div class="card-header">
          <span class="card-icon">👤</span>
          <h2>Add User</h2>
        </div>
        <div class="form-group">
          <input type="text" id="userName" placeholder="Enter user name" />
        </div>
        <button class="btn btn-primary full-width" onclick="addUser()">Add User</button>
      </div>

      <!-- Add Deposit -->
      <div class="card">
        <div class="card-header">
          <span class="card-icon">💰</span>
          <h2>Add Deposit</h2>
        </div>
        <div class="form-group">
          <select id="depositUser"></select>
        </div>
        <div class="form-group">
          <input type="number" id="depositAmount" placeholder="Amount (৳)" min="1" />
        </div>
        <button class="btn btn-success full-width" onclick="addDeposit()">Add Deposit</button>
      </div>

      <!-- Add Meal -->
      <div class="card">
        <div class="card-header">
          <span class="card-icon">🍱</span>
          <h2>Add Meal</h2>
        </div>
        <div class="form-group">
          <select id="mealUser"></select>
        </div>
        <div class="form-group">
          <input type="date" id="mealDate" />
        </div>
        <div class="checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" id="lunchCheck" />
            <span class="checkmark"></span>
            Lunch
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="dinnerCheck" />
            <span class="checkmark"></span>
            Dinner
          </label>
        </div>
        <button class="btn btn-primary full-width" onclick="addMeal()">Add Meal</button>
      </div>

    </div>

    <!-- Meal Rate -->
    <div class="card">
      <div class="card-header">
        <span class="card-icon">⚙️</span>
        <h2>Meal Rate Setting</h2>
      </div>
      <div class="rate-row">
        <div class="rate-item">
          <label>Per Meal Rate (৳)</label>
          <input type="number" id="mealRate" placeholder="Optional (৳)" min="1" />
        </div>
        <button class="btn btn-outline" onclick="updateRates()">Set Rate</button>
      </div>
      <div class="rate-info" id="rateInfo"></div>
    </div>

    <!-- Summary -->
    <div class="card">
      <div class="card-header">
        <span class="card-icon">📊</span>
        <h2>Summary</h2>
      </div>
      <div class="table-wrap">
        <table id="summaryTable">
          <thead>
            <tr>
              <th>#</th>
              <th>User</th>
              <th>Lunch</th>
              <th>Dinner</th>
              <th>Total Meals</th>
              <th>Meal Cost (৳)</th>
              <th>Deposited (৳)</th>
              <th>Balance (৳)</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="summaryBody"></tbody>
          <tfoot id="summaryFoot"></tfoot>
        </table>
      </div>
    </div>

    <!-- PDF Export -->
    <div class="card">
      <div class="card-header">
        <span class="card-icon">📄</span>
        <h2>PDF Report</h2>
      </div>
      <div class="rate-row">
        <div class="rate-item">
          <label>Select Month (Optional)</label>
          <input type="month" id="pdfMonth" />
        </div>
        <button class="btn btn-primary" onclick="generatePDF(false)">⬇ Monthly PDF</button>
        <button class="btn btn-success" onclick="generatePDF(true)">⬇ Full Report PDF</button>
      </div>
    </div>

    <!-- Logs Grid -->
    <div class="grid-2">

      <!-- Meal Log -->
      <div class="card">
        <div class="card-header">
          <span class="card-icon">📋</span>
          <h2>Meal Log</h2>
        </div>
        <div class="form-group">
          <select id="filterUser"><option value="">All Users</option></select>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Date</th><th>User</th><th>Lunch</th><th>Dinner</th><th></th></tr>
            </thead>
            <tbody id="mealLogBody"></tbody>
          </table>
        </div>
      </div>

      <!-- Deposit Log -->
      <div class="card">
        <div class="card-header">
          <span class="card-icon">🧾</span>
          <h2>Deposit Log</h2>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>User</th><th>Amount (৳)</th><th>Date</th><th></th></tr>
            </thead>
            <tbody id="depositLogBody"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="app.js"></script>
</body>
</html>

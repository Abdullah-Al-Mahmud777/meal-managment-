<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MealManager — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="auth.css"/>
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-left">
      <a href="index.html" class="auth-brand">🍽️ MealManager</a>
      <h2>Track meals.<br/>Manage deposits.<br/><span>Stay on top.</span></h2>
      <p>A simple tool for managing group meal expenses with real-time sync.</p>
    </div>

    <div class="auth-right">
      <div class="auth-card">

        <!-- Tabs -->
        <div class="auth-tabs">
          <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">Login</button>
          <button class="tab-btn" id="registerTab" onclick="switchTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="you@example.com" required/>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••" required/>
          </div>
          <div id="loginError" class="auth-error"></div>
          <button type="submit" class="btn-auth" id="loginBtn">Login</button>
          <p class="auth-switch">Don't have an account? <a onclick="switchTab('register')">Register</a></p>
        </form>

        <!-- Register Form -->
        <form id="registerForm" style="display:none" onsubmit="handleRegister(event)">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="regName" placeholder="Your name" required/>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="regEmail" placeholder="you@example.com" required/>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="regPassword" placeholder="Min 6 characters" required minlength="6"/>
          </div>
          <div id="registerError" class="auth-error"></div>
          <button type="submit" class="btn-auth" id="registerBtn">Create Account</button>
          <p class="auth-switch">Already have an account? <a onclick="switchTab('login')">Login</a></p>
        </form>

      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="auth.js"></script>
</body>
</html>
